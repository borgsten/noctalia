config_sources = []

[merged_config]
content = """[backdrop]
blur_intensity = 0.0
tint_intensity = 0.0

[bar.default]
end = [ \"tray\", \"volume\", \"notifications\", \"control-center\", \"session\" ]
start = [ \"launcher\", \"wallpaper\", \"workspaces\", \"sysmon\" ]

    [bar.default.dead_zone]
    middle_command = \"noctalia msg panel-open session\"

[calendar]
enabled = true

    [calendar.account.personal_google]
    color = \"secondary\"
    name = \"Snesonix\"
    type = \"google\"

[[control_center.shortcuts]]
type = \"wifi\"

[[control_center.shortcuts]]
type = \"notification\"

[[control_center.shortcuts]]
type = \"caffeine\"

[[control_center.shortcuts]]
type = \"nightlight\"

[[control_center.shortcuts]]
type = \"power_profile\"

[[control_center.shortcuts]]
type = \"bluetooth\"

[dock]
pinned = [ \"vesktop\", \"app.zen_browser.zen\", \"steam\", \"org.prismlauncher.PrismLauncher\" ]

[location]
address = \"Lustadt\"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ \"lockscreen-login-box@HDMI-A-1\" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget.\"lockscreen-login-box@HDMI-A-1\"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = \"HDMI-A-1\"
    rotation = 0.0
    type = \"login_box\"

        [lockscreen_widgets.widget.\"lockscreen-login-box@HDMI-A-1\".settings]
        background_color = \"surface_variant\"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[notification]
filter_order = [ \"filter\" ]
layer = \"overlay\"

    [notification.filter.filter]
    allow_permanent = false
    enabled = true
    match = \"limine-snapper-restore\"
    play_sound = true
    save_history = true
    show_toast = true

[plugins]
enabled = [ \"noctalia/kaomoji\" ]

[shell]
settings_show_advanced = true
telemetry_enabled = true

    [shell.mpris]
    blacklist = [ \"Mozilla zen\" ]

    [shell.screenshot]
    directory = \"/home/snesonix/Pictures/Screenshots\"

[theme]
builtin = \"Catppuccin\"

[wallpaper]
directory = \"/home/snesonix/Pictures/Wallpapers\"
transition_on_startup = true

    [wallpaper.automation]
    enabled = true

    [wallpaper.default]
    path = \"/home/snesonix/Pictures/Wallpapers/nord-street.png\"

    [wallpaper.last]
    path = \"/home/snesonix/Pictures/Wallpapers/nord-street.png\"

    [wallpaper.monitors.HDMI-A-1]
    path = \"/home/snesonix/Pictures/Wallpapers/nord-street.png\"

    [[wallpaper.favorite]]
    path = \"/home/snesonix/Pictures/Wallpapers/love.png\"
    theme_mode = \"auto\"

[widget.clock]
color = \"secondary\"
format = \"{:%d.%m.%y  %H:%M}\"

[widget.sysmon]
stat = \"ram_used\"

[widget.tray]
color = \"secondary\"
drawer = true
scale = 1.1000000000000001"""

[paths]
config_dir = "/home/snesonix/.config/noctalia"
settings_path = "/home/snesonix/.local/state/noctalia/settings.toml"
state_path = "/home/snesonix/.local/state/noctalia/state.toml"

[report]
format_version = 1
generated_at_utc = "2026-06-30T13:08:05Z"
generated_by = "noctalia"
git_revision = "c21423fc9bc8"
noctalia_version = "5.0.0"

